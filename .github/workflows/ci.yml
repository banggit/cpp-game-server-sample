name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, Release]
        include:
          - os: ubuntu-latest
            preset: linux
          - os: macos-latest
            preset: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ────────────────────────────────────────────
      # Dependencies
      # ────────────────────────────────────────────
      - name: Cache APT packages (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-boost-cmake

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-dev cmake build-essential

      - name: Cache Homebrew (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Homebrew
          key: brew-${{ runner.os }}-boost-cmake

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install boost cmake

      # ────────────────────────────────────────────
      # Build cache
      # ────────────────────────────────────────────
      - name: Cache CMake build directory
        uses: actions/cache@v4
        with:
          path: build
          key: build-${{ runner.os }}-${{ matrix.build_type }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            build-${{ runner.os }}-${{ matrix.build_type }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}-
            build-${{ runner.os }}-${{ matrix.build_type }}-

      # ────────────────────────────────────────────
      # Configure & build
      # ────────────────────────────────────────────
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}

      # ────────────────────────────────────────────
      # Smoke test - server starts and shuts down cleanly
      # ────────────────────────────────────────────
      - name: Smoke test
        run: |
          ./build/game_server 7777 &
          SERVER_PID=$!
          sleep 2
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "Server failed to start"
            exit 1
          fi
          kill -SIGTERM $SERVER_PID
          wait $SERVER_PID 2>/dev/null || true
          echo "Server started and shut down cleanly"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: cpp-game-server-sample:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (Docker)
        run: |
          docker run -d --name gss-test -p 7777:7777 cpp-game-server-sample:ci
          sleep 3
          if ! docker ps | grep gss-test; then
            echo "Container failed to start"
            docker logs gss-test
            exit 1
          fi
          docker stop gss-test
          docker rm gss-test
          echo "Docker container started and shut down cleanly"